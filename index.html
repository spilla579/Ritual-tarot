```html
<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ritual Tarot</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:
  radial-gradient(circle at top,
  rgba(88,28,135,.45),
  #050505 40%);

  background-color:#050505;

  color:white;

  min-height:100vh;

  font-family:'Inter',sans-serif;

  overflow-x:hidden;
}

body::before{

  content:'';

  position:fixed;

  inset:0;

  background:
  url('https://www.transparenttextures.com/patterns/stardust.png');

  opacity:.15;

  pointer-events:none;
}

.wrapper{

  max-width:1300px;

  margin:auto;

  padding:30px 24px 100px;

  position:relative;

  z-index:2;
}

/* TOPBAR */

.topbar{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:80px;

  flex-wrap:wrap;

  gap:20px;
}

.logo-wrap{

  display:flex;

  align-items:center;

  gap:18px;
}

.logo-img{

  width:64px;

  height:64px;

  object-fit:contain;

  filter:
  drop-shadow(0 0 20px rgba(255,255,255,.2));
}

.logo-title{

  font-family:'Cinzel',serif;

  font-size:34px;

  letter-spacing:1px;

  font-weight:700;
}

.logo-sub{

  color:#c084fc;

  letter-spacing:4px;

  font-size:12px;

  margin-top:6px;
}

/* WALLET */

.wallet-box{

  display:flex;

  align-items:center;

  gap:16px;

  background:
  rgba(255,255,255,.04);

  border:
  1px solid rgba(255,255,255,.08);

  border-radius:22px;

  padding:12px 16px;

  backdrop-filter:blur(16px);

  box-shadow:
  0 0 40px rgba(168,85,247,.12);
}

.wallet-dot{

  width:10px;

  height:10px;

  border-radius:50%;

  background:#00ff99;

  box-shadow:
  0 0 12px #00ff99;
}

.wallet-address{

  font-size:14px;

  opacity:.85;
}

.connect-btn{

  border:none;

  background:
  linear-gradient(
  135deg,
  #7e22ce,
  #c026d3);

  color:white;

  padding:14px 22px;

  border-radius:16px;

  font-weight:600;

  cursor:pointer;

  transition:.3s;

  box-shadow:
  0 0 20px rgba(168,85,247,.3);
}

.connect-btn:hover{

  transform:translateY(-2px);

  box-shadow:
  0 0 30px rgba(168,85,247,.45);
}

/* HERO */

.hero{

  text-align:center;

  position:relative;

  margin-bottom:70px;
}

.hero::before{

  content:'';

  position:absolute;

  width:900px;

  height:900px;

  left:50%;

  top:-280px;

  transform:translateX(-50%);

  background:
  radial-gradient(circle,
  rgba(168,85,247,.16),
  transparent 70%);

  pointer-events:none;
}

.hero-badge{

  display:inline-flex;

  align-items:center;

  gap:10px;

  padding:10px 18px;

  border-radius:999px;

  border:
  1px solid rgba(168,85,247,.35);

  background:
  rgba(168,85,247,.1);

  margin-bottom:30px;

  color:#d8b4fe;

  font-size:13px;
}

.hero-title{

  font-family:'Cinzel',serif;

  font-size:92px;

  line-height:1;

  margin-bottom:28px;
}

.hero-title span{

  background:
  linear-gradient(
  135deg,
  #e9d5ff,
  #a855f7);

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

.hero-desc{

  max-width:760px;

  margin:auto;

  opacity:.72;

  font-size:22px;

  line-height:1.9;
}

.hero-btn{

  margin-top:40px;

  border:none;

  background:
  linear-gradient(
  135deg,
  #581c87,
  #a855f7);

  color:white;

  padding:18px 34px;

  border-radius:18px;

  font-size:17px;

  cursor:pointer;

  transition:.3s;

  box-shadow:
  0 0 30px rgba(168,85,247,.3);
}

.hero-btn:hover{

  transform:translateY(-4px);

  box-shadow:
  0 0 40px rgba(168,85,247,.45);
}

/* CARD AREA */

.main-grid{

  display:grid;

  grid-template-columns:
  1fr 1fr;

  gap:40px;

  align-items:center;

  margin-top:80px;
}

.tarot-area{

  display:flex;

  justify-content:center;
}

.tarot-card{

  width:280px;

  height:470px;

  perspective:1400px;

  cursor:pointer;
}

.card-inner{

  width:100%;

  height:100%;

  position:relative;

  transform-style:preserve-3d;

  transition:transform 1s;
}

.tarot-card.flipped .card-inner{

  transform:rotateY(180deg);
}

.card-face{

  position:absolute;

  width:100%;

  height:100%;

  border-radius:28px;

  backface-visibility:hidden;

  overflow:hidden;
}

.card-back{

  background:
  linear-gradient(
  145deg,
  #12071d,
  #050505);

  border:
  2px solid rgba(212,175,55,.45);

  display:flex;

  justify-content:center;

  align-items:center;

  position:relative;

  box-shadow:
  0 0 40px rgba(168,85,247,.25);
}

.card-back::before{

  content:'';

  position:absolute;

  inset:14px;

  border:
  1px solid rgba(212,175,55,.35);

  border-radius:20px;
}

.card-logo{

  width:130px;

  opacity:.92;

  filter:
  drop-shadow(0 0 16px rgba(255,255,255,.25));
}

.card-front{

  background:
  linear-gradient(
  145deg,
  #f5f0df,
  #e7dcc1);

  color:black;

  transform:rotateY(180deg);

  padding:26px;

  text-align:center;

  border:
  2px solid #d4af37;
}

.card-symbol{

  font-size:90px;

  margin-top:30px;
}

.card-name{

  font-family:'Cinzel',serif;

  font-size:34px;

  margin-top:24px;

  font-weight:700;
}

.card-meaning{

  margin-top:28px;

  line-height:1.8;

  font-size:18px;
}

/* READING */

.reading-box{

  background:
  rgba(255,255,255,.03);

  border:
  1px solid rgba(255,255,255,.08);

  border-radius:28px;

  padding:40px;

  backdrop-filter:blur(16px);

  display:none;
}

.reading-box.visible{

  display:block;
}

.reading-title{

  font-family:'Cinzel',serif;

  font-size:32px;

  margin-bottom:30px;

  color:#d8b4fe;
}

.reading-body{

  line-height:2;

  font-size:20px;

  opacity:.9;
}

.tx-link{

  display:inline-block;

  margin-top:24px;

  color:#d8b4fe;

  word-break:break-all;
}

.reset-btn{

  margin-top:34px;

  border:none;

  background:
  linear-gradient(
  135deg,
  #581c87,
  #a855f7);

  color:white;

  padding:14px 24px;

  border-radius:14px;

  cursor:pointer;
}

/* FOOTER */

.footer{

  margin-top:100px;

  text-align:center;

  opacity:.45;
}

/* MOBILE */

@media(max-width:900px){

  .main-grid{

    grid-template-columns:1fr;
  }

  .hero-title{

    font-size:58px;
  }

  .hero-desc{

    font-size:18px;
  }

}

</style>

</head>

<body>

<div class="wrapper">

<!-- TOPBAR -->

<div class="topbar">

<div class="logo-wrap">

<img
src="https://i.imgur.com/Jr6pf0D.png"
class="logo-img"
/>

<div>

<div class="logo-title">
RITUAL TAROT
</div>

<div class="logo-sub">
ONCHAIN ORACLE
</div>

</div>

</div>

<div class="wallet-box">

<div class="wallet-dot"></div>

<div
class="wallet-address"
id="walletDisplay">

Wallet Not Connected

</div>

<button
class="connect-btn"
id="connectBtn">

Connect Wallet

</button>

</div>

</div>

<!-- HERO -->

<div class="hero">

<div class="hero-badge">
✦ TAROT · Ritual Network
</div>

<div class="hero-title">

Reveal Your
<br>

<span>Tarot Destiny</span>

</div>

<div class="hero-desc">

Connect your wallet and uncover the mystical message the universe has prepared for you.

</div>

<button
class="hero-btn"
onclick="scrollToCard()">

Reveal My Card

</button>

</div>

<!-- MAIN -->

<div class="main-grid">

<div class="tarot-area">

<div
class="tarot-card"
id="tarotCard">

<div class="card-inner">

<div class="card-face card-back">

<img
src="https://i.imgur.com/Jr6pf0D.png"
class="card-logo"
/>

</div>

<div
class="card-face card-front"
id="cardFront">

</div>

</div>

</div>

</div>

<div
class="reading-box"
id="readingBox">

<div class="reading-title">
Your Oracle Reading
</div>

<div
class="reading-body"
id="readingBody">

</div>

<div id="txBox"></div>

<button
class="reset-btn"
onclick="location.reload()">

Draw Again

</button>

</div>

</div>

<div class="footer">

Powered by Ritual Network · MetaMask · Ethers.js

</div>

</div>

<script>

const CARDS=[

{
name:"The Star",
symbol:"⭐",
meaning:"Hy vọng và chữa lành đang dẫn lối cho bạn."
},

{
name:"The Sun",
symbol:"☀️",
meaning:"Ánh sáng và thành công đang soi đường phía trước."
},

{
name:"The Fool",
symbol:"🌟",
meaning:"Một hành trình mới đang bắt đầu."
},

{
name:"Death",
symbol:"🌑",
meaning:"Sự chuyển hóa mạnh mẽ đang đến."
},

{
name:"The World",
symbol:"🌍",
meaning:"Bạn sắp hoàn thành một chu kỳ lớn."
}

];

let provider;

let signer;

let walletAddress="";

let selectedCard=null;

let txHash="";

function scrollToCard(){

document
.getElementById("tarotCard")
.scrollIntoView({
behavior:"smooth"
});

}

async function connectWallet(){

try{

if(!window.ethereum){

alert("Please install MetaMask");

return;

}

provider=
new ethers.BrowserProvider(window.ethereum);

await provider.send(
"eth_requestAccounts",
[]
);

signer=
await provider.getSigner();

walletAddress=
await signer.getAddress();

document
.getElementById("walletDisplay")
.innerText=

walletAddress.slice(0,6)
+
"..."
+
walletAddress.slice(-4);

document
.getElementById("connectBtn")
.innerText="Connected";

selectedCard=
CARDS[
Math.floor(
Math.random()*CARDS.length
)
];

renderCard();

}catch(err){

console.error(err);

}

}

function renderCard(){

const front=
document.getElementById("cardFront");

front.innerHTML=

"<div class='card-symbol'>"
+
selectedCard.symbol
+
"</div>"

+

"<div class='card-name'>"
+
selectedCard.name
+
"</div>"

+

"<div class='card-meaning'>"
+
selectedCard.meaning
+
"</div>";

}

async function revealCard(){

if(!selectedCard){

alert("Connect wallet first");

return;

}

const card=
document.getElementById("tarotCard");

if(card.classList.contains("flipped")){

return;

}

card.classList.add("flipped");

await sendTransaction();

showReading();

}

async function sendTransaction(){

try{

const tx=
await signer.sendTransaction({

to:walletAddress,

value:ethers.parseEther("0.000001")

});

txHash=tx.hash;

await tx.wait();

}catch(err){

console.error(err);

txHash="Transaction rejected";
}

}

function showReading(){

const box=
document.getElementById("readingBox");

const body=
document.getElementById("readingBody");

const tx=
document.getElementById("txBox");

box.classList.add("visible");

body.innerHTML=

selectedCard.symbol

+

"<br><br>"

+

"<strong>"

+

selectedCard.name

+

"</strong>"

+

"<br><br>"

+

selectedCard.meaning

+

"<br><br>"

+

"The Ritual Oracle has sealed your destiny.";

tx.innerHTML=

"<a class='tx-link' target='_blank' href='https://sepolia.etherscan.io/tx/"

+

txHash

+

"'>"

+

txHash

+

"</a>";

}

window.addEventListener("load",()=>{

document
.getElementById("connectBtn")
.addEventListener(
"click",
connectWallet
);

document
.getElementById("tarotCard")
.addEventListener(
"click",
revealCard
);

});

</script>

</body>

</html>
```
