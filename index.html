```html
<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Ritual Tarot</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:
  radial-gradient(circle at top,#2a1846,#120b1f 70%);

  min-height:100vh;

  font-family:'Inter',sans-serif;

  color:white;

  overflow-x:hidden;
}

.wrapper{

  max-width:1200px;

  margin:auto;

  padding:30px 20px 100px;

}

.topbar{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:50px;

  flex-wrap:wrap;

  gap:20px;
}

.logo-wrap{

  display:flex;

  align-items:center;

  gap:16px;
}

.logo-icon{

  width:58px;

  height:58px;

  border-radius:18px;

  background:linear-gradient(135deg,#8b5cf6,#d946ef);

  display:flex;

  justify-content:center;

  align-items:center;

  font-size:28px;

  box-shadow:0 0 40px rgba(168,85,247,.45);
}

.logo-title{

  font-family:'Cinzel',serif;

  font-size:24px;

  font-weight:700;
}

.logo-sub{

  opacity:.6;

  font-size:12px;

  letter-spacing:2px;
}

.wallet-box{

  display:flex;

  align-items:center;

  gap:14px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  border-radius:20px;

  padding:12px 16px;

  backdrop-filter:blur(12px);
}

.wallet-dot{

  width:10px;

  height:10px;

  border-radius:50%;

  background:#00ff99;

  box-shadow:0 0 14px #00ff99;
}

.wallet-address{

  font-size:14px;

  opacity:.8;
}

.connect-btn{

  border:none;

  background:linear-gradient(135deg,#9333ea,#d946ef);

  color:white;

  padding:12px 18px;

  border-radius:14px;

  cursor:pointer;

  font-weight:600;

  transition:.25s;
}

.connect-btn:hover{

  transform:translateY(-2px);
}

.hero{

  position:relative;

  overflow:hidden;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.08);

  border-radius:36px;

  padding:80px 30px;

  text-align:center;

  backdrop-filter:blur(14px);
}

.hero::before{

  content:'';

  position:absolute;

  width:600px;

  height:600px;

  background:
  radial-gradient(circle,
  rgba(168,85,247,.22),
  transparent 70%);

  top:-250px;

  right:-150px;
}

.hero-badge{

  display:inline-flex;

  align-items:center;

  gap:10px;

  padding:10px 18px;

  border-radius:999px;

  background:rgba(168,85,247,.12);

  border:1px solid rgba(168,85,247,.25);

  margin-bottom:26px;

  font-size:13px;
}

.hero-title{

  font-family:'Cinzel',serif;

  font-size:72px;

  line-height:1.1;

  margin-bottom:24px;
}

.hero-title span{

  background:
  linear-gradient(135deg,#c084fc,#ffffff);

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

.hero-desc{

  max-width:760px;

  margin:auto;

  opacity:.72;

  line-height:1.9;

  font-size:20px;
}

.hero-btn{

  margin-top:36px;

  border:none;

  background:
  linear-gradient(135deg,#9333ea,#d946ef);

  color:white;

  padding:18px 30px;

  border-radius:18px;

  cursor:pointer;

  font-size:16px;

  font-weight:700;

  transition:.25s;
}

.hero-btn:hover{

  transform:translateY(-3px);
}

.cards-area{

  margin-top:70px;

  display:none;

  justify-content:center;
}

.tarot-card{

  width:240px;

  height:390px;

  perspective:1200px;

  cursor:pointer;
}

.card-inner{

  width:100%;

  height:100%;

  position:relative;

  transform-style:preserve-3d;

  transition:transform 1s;
}

.tarot-card.flipped .card-inner{

  transform:rotateY(180deg);
}

.card-face{

  position:absolute;

  width:100%;

  height:100%;

  border-radius:28px;

  backface-visibility:hidden;
}

.card-back{

  background:
  linear-gradient(145deg,#2e1950,#1b102d);

  border:2px solid rgba(201,168,76,.45);

  display:flex;

  justify-content:center;

  align-items:center;

  font-size:90px;

  box-shadow:0 0 40px rgba(168,85,247,.25);
}

.card-front{

  background:#f7f1e1;

  color:black;

  transform:rotateY(180deg);

  padding:24px;

  text-align:center;

  border:2px solid #c9a84c;
}

.card-symbol{

  font-size:80px;

  margin-top:30px;
}

.card-name{

  margin-top:26px;

  font-size:28px;

  font-family:'Cinzel',serif;

  font-weight:700;
}

.card-meaning{

  margin-top:28px;

  line-height:1.8;

  font-size:18px;
}

.reading{

  margin-top:50px;

  display:none;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.08);

  border-radius:28px;

  padding:36px;
}

.reading.visible{

  display:block;
}

.reading-title{

  text-align:center;

  font-size:32px;

  font-family:'Cinzel',serif;

  margin-bottom:26px;

  color:#d8b4fe;
}

.reading-body{

  text-align:center;

  line-height:2;

  font-size:20px;
}

.tx-box{

  margin-top:30px;

  text-align:center;
}

.tx-link{

  color:#c084fc;

  word-break:break-all;
}

.footer{

  margin-top:80px;

  text-align:center;

  opacity:.45;
}

.reset-btn{

  margin-top:30px;

  border:none;

  background:
  linear-gradient(135deg,#9333ea,#d946ef);

  color:white;

  padding:14px 24px;

  border-radius:14px;

  cursor:pointer;
}

@media(max-width:768px){

  .hero-title{

    font-size:48px;
  }

  .hero-desc{

    font-size:17px;
  }

  .tarot-card{

    width:200px;

    height:330px;
  }

}

</style>

</head>

<body>

<div class="wrapper">

<div class="topbar">

<div class="logo-wrap">

<div class="logo-icon">
🔮
</div>

<div>

<div class="logo-title">
Ritual Tarot
</div>

<div class="logo-sub">
ONCHAIN ORACLE
</div>

</div>

</div>

<div class="wallet-box">

<div class="wallet-dot"></div>

<div class="wallet-address" id="walletDisplay">
Wallet Not Connected
</div>

<button class="connect-btn" id="connectBtn">
Connect Wallet
</button>

</div>

</div>

<div class="hero">

<div class="hero-badge">
✦ TAROT · Ritual Network
</div>

<div class="hero-title">
Reveal Your <span>Tarot</span> Destiny
</div>

<div class="hero-desc">

Connect your wallet and uncover your mystical onchain tarot reading powered by Ritual Network.

</div>

<button class="hero-btn"
onclick="scrollToCard()">

Reveal My Card

</button>

</div>

<div class="cards-area" id="cardsArea">

<div class="tarot-card" id="tarotCard">

<div class="card-inner">

<div class="card-face card-back">
🔮
</div>

<div class="card-face card-front" id="cardFront">

</div>

</div>

</div>

</div>

<div class="reading" id="readingSection">

<div class="reading-title">
Your Oracle Reading
</div>

<div class="reading-body" id="readingBody"></div>

<div class="tx-box" id="txBox"></div>

<div style="text-align:center">

<button class="reset-btn"
onclick="location.reload()">

Draw Again

</button>

</div>

</div>

<div class="footer">

Powered by Ritual Network · MetaMask · Ethers.js

</div>

</div>

<script>

const CARDS = [

{
name:"The Fool",
symbol:"🌟",
meaning:"Một khởi đầu mới đang mở ra trước mắt bạn."
},

{
name:"The Magician",
symbol:"🪄",
meaning:"Bạn đã có đủ sức mạnh để tạo nên điều mình mong muốn."
},

{
name:"The Star",
symbol:"⭐",
meaning:"Hy vọng và chữa lành đang dẫn lối cho bạn."
},

{
name:"The Sun",
symbol:"☀️",
meaning:"Niềm vui và thành công đang soi sáng con đường phía trước."
},

{
name:"Wheel of Fortune",
symbol:"☸️",
meaning:"Vận may đang dịch chuyển theo hướng có lợi cho bạn."
},

{
name:"Death",
symbol:"🌑",
meaning:"Sự chuyển hóa đang mở ra một chương hoàn toàn mới."
},

{
name:"The World",
symbol:"🌍",
meaning:"Một chu kỳ lớn đang hoàn thành với thành tựu rực rỡ."
}

];

let provider;

let signer;

let walletAddress="";

let selectedCard=null;

let txHash="";

function scrollToCard(){

document
.getElementById("cardsArea")
.scrollIntoView({
behavior:"smooth"
});

}

async function connectWallet(){

try{

if(!window.ethereum){

alert("Vui lòng cài MetaMask");

return;

}

provider=
new ethers.BrowserProvider(window.ethereum);

await provider.send(
"eth_requestAccounts",
[]
);

signer=
await provider.getSigner();

walletAddress=
await signer.getAddress();

document
.getElementById("walletDisplay")
.innerText=

walletAddress.slice(0,6)
+
"..."
+
walletAddress.slice(-4);

document
.getElementById("cardsArea")
.style.display="flex";

document
.getElementById("connectBtn")
.innerText="Connected";

selectedCard=
CARDS[
Math.floor(
Math.random()*CARDS.length
)
];

renderCard();

}catch(err){

console.error(err);

alert("Không thể kết nối ví");

}

}

function renderCard(){

const front=
document.getElementById("cardFront");

front.innerHTML=

"<div class='card-symbol'>"
+
selectedCard.symbol
+
"</div>"

+

"<div class='card-name'>"
+
selectedCard.name
+
"</div>"

+

"<div class='card-meaning'>"
+
selectedCard.meaning
+
"</div>";

}

async function revealCard(){

const card=
document.getElementById("tarotCard");

if(card.classList.contains("flipped")){

return;

}

card.classList.add("flipped");

await sendTransaction();

showReading();

}

async function sendTransaction(){

try{

if(!signer){

txHash="Wallet not connected";

return;

}

const tx=
await signer.sendTransaction({

to:walletAddress,

value:ethers.parseEther("0.000001")

});

txHash=tx.hash;

await tx.wait();

}catch(err){

console.error(err);

txHash="Transaction rejected";

}

}

function showReading(){

const section=
document.getElementById("readingSection");

const body=
document.getElementById("readingBody");

const txBox=
document.getElementById("txBox");

section.classList.add("visible");

body.innerHTML=

selectedCard.symbol

+

"<br><br>"

+

"<strong>"

+

selectedCard.name

+

"</strong>"

+

"<br><br>"

+

selectedCard.meaning

+

"<br><br>"

+

"Ritual đã ghi lại vận mệnh oracle của bạn.";

if(
txHash &&
txHash.startsWith("0x")
){

txBox.innerHTML=

"<div style='margin-bottom:12px'>Transaction:</div>"

+

"<a class='tx-link' target='_blank' href='https://sepolia.etherscan.io/tx/"

+

txHash

+

"'>"

+

txHash

+

"</a>";

}else{

txBox.innerHTML=

"<div class='tx-link'>"

+

txHash

+

"</div>";

}

}

window.addEventListener("load",()=>{

document
.getElementById("connectBtn")
.addEventListener(
"click",
connectWallet
);

document
.getElementById("tarotCard")
.addEventListener(
"click",
revealCard
);

});

</script>

</body>

</html>
```
