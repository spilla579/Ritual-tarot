<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritual Tarot — Your Card of the Day</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --gold-dim: #7a6230;
    --ink: #0d0a0e;
    --parchment: #f5efe0;
    --parchment-dark: #e8dfc8;
    --mystic: #1a0f2e;
    --mystic-mid: #2d1b4e;
    --violet: #6b3fa0;
    --violet-light: #9b6fd4;
    --card-w: 180px;
    --card-h: 310px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--mystic);
    color: var(--parchment);
    font-family: 'EB Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* starfield */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 10%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 25%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 80%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 45%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 90%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* nebula glow */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(107,63,160,0.15) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* header */
  .header { text-align: center; margin-bottom: 48px; }

  .logo-symbol {
    font-size: 36px;
    display: block;
    margin-bottom: 12px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(22px, 4vw, 32px);
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    margin-bottom: 8px;
  }

  .header p {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: rgba(245,239,224,0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px auto; max-width: 300px;
  }
  .divider::before,.divider::after {
    content: ''; flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .divider span { color: var(--gold); font-size: 14px; }

  /* wallet section */
  .wallet-box {
    background: rgba(45,27,78,0.5);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .wallet-icon {
    width: 44px; height: 44px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .wallet-info { flex: 1; min-width: 180px; }
  .wallet-info label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .wallet-input {
    width: 100%;
    background: rgba(13,10,14,0.6);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--parchment);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .wallet-input:focus { border-color: rgba(201,168,76,0.6); }
  .wallet-input::placeholder { color: rgba(245,239,224,0.25); }

  .connect-btn {
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border: none;
    border-radius: 10px;
    color: var(--ink);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .connect-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .connect-btn:active { transform: translateY(0); }
  .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* 3 card spread */
  .spread-title {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .cards-area {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }

  .card-slot { text-align: center; }

  .card-slot-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .tarot-card {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    perspective: 800px;
    display: inline-block;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
    border-radius: 12px;
  }

  .tarot-card.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-back {
    background: var(--mystic-mid);
    border: 2px solid rgba(201,168,76,0.35);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
  }

  /* Celtic knot pattern on back */
  .card-back::before {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 8px;
  }

  .card-back-symbol {
    font-size: 48px;
    opacity: 0.3;
    position: relative;
  }

  .card-back-pattern {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(201,168,76,0.04) 0px, rgba(201,168,76,0.04) 1px, transparent 1px, transparent 12px),
      repeating-linear-gradient(-45deg, rgba(201,168,76,0.04) 0px, rgba(201,168,76,0.04) 1px, transparent 1px, transparent 12px);
    border-radius: 10px;
  }

  /* pulse on unflipped cards waiting */
  .tarot-card.waiting .card-back {
    animation: pulse-glow 2.5s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 0 rgba(201,168,76,0); border-color: rgba(201,168,76,0.35); }
    50% { box-shadow: 0 0 20px rgba(201,168,76,0.25); border-color: rgba(201,168,76,0.6); }
  }

  .card-front {
    transform: rotateY(180deg);
    background: var(--parchment);
    border: 2px solid var(--gold);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 14px 10px;
    gap: 8px;
    overflow: hidden;
  }

  .card-front-border {
    position: absolute; inset: 5px;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    pointer-events: none;
  }

  .card-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.15em;
  }

  .card-arcana-symbol {
    font-size: 52px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
    text-align: center;
    letter-spacing: 0.08em;
    line-height: 1.3;
  }

  .card-divider-line {
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .card-element {
    font-size: 10px;
    color: var(--violet);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.12em;
  }

  .card-keyword {
    font-size: 11px;
    color: var(--ink);
    font-style: italic;
    text-align: center;
    line-height: 1.4;
    opacity: 0.75;
    padding: 0 4px;
  }

  .card-inverted-badge {
    background: rgba(107,63,160,0.12);
    border: 1px solid rgba(107,63,160,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--violet);
    letter-spacing: 0.1em;
  }

  /* reading section */
  .reading-section {
    background: rgba(45,27,78,0.4);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 20px;
    padding: 32px;
    display: none;
  }
  .reading-section.visible { display: block; }

  .reading-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .reading-header h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .reading-header p {
    font-size: 13px;
    color: rgba(245,239,224,0.45);
    font-style: italic;
  }

  .reading-body {
    font-size: 16px;
    line-height: 1.9;
    color: rgba(245,239,224,0.88);
    white-space: pre-wrap;
    font-style: italic;
  }

  .loading-runes {
    text-align: center;
    padding: 24px;
  }
  .loading-runes span {
    display: inline-block;
    font-size: 24px;
    animation: rune-spin 1.5s linear infinite;
    margin: 0 4px;
  }
  .loading-runes span:nth-child(2) { animation-delay: 0.2s; }
  .loading-runes span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes rune-spin {
    0%,100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  .loading-runes p {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
    margin-top: 12px;
    text-transform: uppercase;
  }

  .error-msg {
    color: #e07070;
    font-size: 14px;
    text-align: center;
    font-style: italic;
    padding: 16px;
  }

  /* date tag */
  .date-tag {
    text-align: center;
    margin-bottom: 40px;
  }
  .date-tag span {
    display: inline-block;
    padding: 6px 20px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  /* shuffle btn */
  .shuffle-row {
    text-align: center;
    margin-bottom: 40px;
  }
  .shuffle-btn {
    padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--gold-dim);
    border-radius: 12px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .shuffle-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(201,168,76,0.07);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .shuffle-btn:hover { border-color: var(--gold); text-shadow: 0 0 12px rgba(201,168,76,0.5); }
  .shuffle-btn:hover::before { transform: scaleX(1); }
  .shuffle-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* footer note */
  .footer-note {
    text-align: center;
    margin-top: 48px;
    font-size: 12px;
    color: rgba(245,239,224,0.2);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  @media (max-width: 540px) {
    :root { --card-w: 140px; --card-h: 240px; }
    .cards-area { gap: 16px; }
    .reading-section { padding: 20px 16px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header class="header">
    <span class="logo-symbol">✦</span>
    <h1>Ritual Tarot</h1>
    <p>Your Card of the Day · On-chain Oracle</p>
    <div class="divider"><span>⬡</span></div>
  </header>

  <div class="date-tag">
    <span id="dateDisplay"></span>
  </div>

  <div class="wallet-box">
    <div class="wallet-icon">⬡</div>
    <div class="wallet-info">
      <label>Wallet Address (Ritual Testnet)</label>
      <input class="wallet-input" id="walletAddr" type="text"
        placeholder="0x... or enter any name"
        value="0x7f3a...9b2c" />
    </div>
    <button class="connect-btn" id="connectBtn" onclick="startReading()">
      Read My Fate ✦
    </button>
  </div>

  <div class="spread-title" id="spreadTitle" style="display:none">
    ✦ &nbsp; Three-Card Spread — Past · Present · Future &nbsp; ✦
  </div>

  <div class="cards-area" id="cardsArea" style="display:none">
    <div class="card-slot">
      <span class="card-slot-label">Past</span>
      <div class="tarot-card" id="card0" onclick="flipCard(0)">
        <div class="card-inner">
          <div class="card-face card-back">
            <div class="card-back-pattern"></div>
            <div class="card-back-symbol">🔮</div>
          </div>
          <div class="card-face card-front" id="front0">
            <div class="card-front-border"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-slot">
      <span class="card-slot-label">Present</span>
      <div class="tarot-card" id="card1" onclick="flipCard(1)">
        <div class="card-inner">
          <div class="card-face card-back">
            <div class="card-back-pattern"></div>
            <div class="card-back-symbol">🔮</div>
          </div>
          <div class="card-face card-front" id="front1">
            <div class="card-front-border"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-slot">
      <span class="card-slot-label">Future</span>
      <div class="tarot-card" id="card2" onclick="flipCard(2)">
        <div class="card-inner">
          <div class="card-face card-back">
            <div class="card-back-pattern"></div>
            <div class="card-back-symbol">🔮</div>
          </div>
          <div class="card-face card-front" id="front2">
            <div class="card-front-border"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="shuffle-row" id="shuffleRow" style="display:none">
    <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleAndFlip()">
      ✦ &nbsp; Reveal All Cards &nbsp; ✦
    </button>
  </div>

  <div class="reading-section" id="readingSection">
    <div class="reading-header">
      <h2>Your Oracle Reading</h2>
      <p id="readingSubtitle"></p>
    </div>
    <div id="readingBody"></div>
  </div>

  <div class="footer-note">
    Powered by Ritual AI Oracle · Results stored on Ritual Testnet · For entertainment purposes
  </div>

</div>

<script>
const MAJOR_ARCANA = [
  { num: "0",    name: "The Fool",          symbol: "🌟", element: "Air",         keyword: "New beginnings · Freedom · Adventure" },
  { num: "I",    name: "The Magician",      symbol: "🪄", element: "Mercury",     keyword: "Willpower · Talent · Manifestation" },
  { num: "II",   name: "High Priestess",    symbol: "🌙", element: "Moon",        keyword: "Intuition · Wisdom · Inner knowing" },
  { num: "III",  name: "The Empress",       symbol: "🌺", element: "Venus",       keyword: "Abundance · Creativity · Nurturing" },
  { num: "IV",   name: "The Emperor",       symbol: "👑", element: "Aries",       keyword: "Authority · Stability · Leadership" },
  { num: "V",    name: "The Hierophant",    symbol: "🏛️", element: "Taurus",      keyword: "Tradition · Guidance · Knowledge" },
  { num: "VI",   name: "The Lovers",        symbol: "💫", element: "Gemini",      keyword: "Love · Harmony · Alignment" },
  { num: "VII",  name: "The Chariot",       symbol: "⚡", element: "Cancer",      keyword: "Victory · Determination · Momentum" },
  { num: "VIII", name: "Strength",          symbol: "🦁", element: "Leo",         keyword: "Courage · Patience · Inner power" },
  { num: "IX",   name: "The Hermit",        symbol: "🕯️", element: "Virgo",       keyword: "Wisdom · Reflection · Inner light" },
  { num: "X",    name: "Wheel of Fortune",  symbol: "☸️", element: "Jupiter",     keyword: "Good fortune · Cycles · Destiny" },
  { num: "XI",   name: "Justice",           symbol: "⚖️", element: "Libra",       keyword: "Truth · Fairness · Clarity" },
  { num: "XII",  name: "The Hanged Man",    symbol: "🌀", element: "Neptune",     keyword: "Surrender · New perspective · Growth" },
  { num: "XIII", name: "Death",             symbol: "🌑", element: "Scorpio",     keyword: "Transformation · Renewal · Liberation" },
  { num: "XIV",  name: "Temperance",        symbol: "✨", element: "Sagittarius", keyword: "Balance · Purpose · Flow" },
  { num: "XV",   name: "The Devil",         symbol: "🔗", element: "Capricorn",   keyword: "Breaking free · Awakening · Clarity" },
  { num: "XVI",  name: "The Tower",         symbol: "⚡", element: "Mars",        keyword: "Breakthrough · Release · Revelation" },
  { num: "XVII", name: "The Star",          symbol: "⭐", element: "Aquarius",    keyword: "Hope · Healing · Inspiration" },
  { num: "XVIII",name: "The Moon",          symbol: "🌕", element: "Pisces",      keyword: "Imagination · Intuition · Dreams" },
  { num: "XIX",  name: "The Sun",           symbol: "☀️", element: "Sun",         keyword: "Joy · Success · Vitality" },
  { num: "XX",   name: "Judgement",         symbol: "🎺", element: "Pluto",       keyword: "Awakening · Forgiveness · Rebirth" },
  { num: "XXI",  name: "The World",         symbol: "🌍", element: "Saturn",      keyword: "Completion · Achievement · Wholeness" },
];

let drawnCards = [];
let flippedCount = 0;
let readingText = "";

function getDate() {
  const d = new Date();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return `${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
document.getElementById("dateDisplay").textContent = getDate();

function drawCards() {
  const pool = [...MAJOR_ARCANA];
  const picked = [];
  while (picked.length < 3) {
    const idx = Math.floor(Math.random() * pool.length);
    picked.push({ ...pool.splice(idx, 1)[0], inverted: false });
  }
  return picked;
}

function renderCardFront(frontEl, card) {
  frontEl.innerHTML = `
    <div class="card-front-border"></div>
    <div class="card-num">${card.num}</div>
    <div class="card-arcana-symbol" style="${card.inverted ? 'transform:rotate(180deg)' : ''}">${card.symbol}</div>
    <div class="card-name">${card.name}</div>
    <div class="card-divider-line"></div>
    <div class="card-element">${card.element}</div>
    <div class="card-keyword">${card.keyword}</div>
  `;
}

function startReading() {
  const wallet = document.getElementById("walletAddr").value.trim();
  if (!wallet) { alert("Please enter a wallet address"); return; }

  document.getElementById("connectBtn").disabled = true;
  document.getElementById("connectBtn").textContent = "Shuffling cards...";

  drawnCards = drawCards();
  flippedCount = 0;
  readingText = "";

  for (let i = 0; i < 3; i++) {
    const front = document.getElementById("front" + i);
    renderCardFront(front, drawnCards[i]);
    const card = document.getElementById("card" + i);
    card.classList.remove("flipped", "waiting");
    card.classList.add("waiting");
  }

  document.getElementById("readingSection").classList.remove("visible");
  document.getElementById("readingBody").innerHTML = "";

  document.getElementById("spreadTitle").style.display = "block";
  document.getElementById("cardsArea").style.display = "flex";
  document.getElementById("shuffleRow").style.display = "block";
  document.getElementById("shuffleBtn").disabled = false;

  setTimeout(() => {
    document.getElementById("connectBtn").disabled = false;
    document.getElementById("connectBtn").textContent = "Read Again ✦";
  }, 600);
}

function flipCard(i) {
  const card = document.getElementById("card" + i);
  if (card.classList.contains("flipped")) return;
  card.classList.remove("waiting");
  card.classList.add("flipped");
  flippedCount++;
  if (flippedCount === 3) {
    fetchReading();
  }
}

function shuffleAndFlip() {
  document.getElementById("shuffleBtn").disabled = true;
  [0,1,2].forEach((i, idx) => {
    setTimeout(() => flipCard(i), idx * 350);
  });
}

async function fetchReading() {
  const section = document.getElementById("readingSection");
  const body = document.getElementById("readingBody");
  const subtitle = document.getElementById("readingSubtitle");

  section.classList.add("visible");
  const wallet = document.getElementById("walletAddr").value.trim();
  const shortWallet = wallet.length > 16 ? wallet.slice(0,8)+"..."+wallet.slice(-4) : wallet;
  subtitle.textContent = `For ${shortWallet} · ${getDate()}`;

  body.innerHTML = `
    <div class="loading-runes">
      <span>✦</span><span>⬡</span><span>✦</span>
      <p>Ritual AI Oracle is channeling your destiny...</p>
    </div>`;

  const c = drawnCards;
  const positions = ["Past", "Present", "Future"];
  const cardDesc = c.map((card, i) =>
    `${positions[i]}: ${card.name} (${card.num})`
  ).join("\n");

  const prompt = `You are a radiant, uplifting Tarot oracle who reads the Major Arcana with wisdom and warmth. Today is ${getDate()}.

The seeker has drawn these three cards:
${cardDesc}

Write an inspiring, hopeful oracle reading in English, around 160–190 words. Structure it as flowing prose (no headers or bullet points):

1. Open with a beautiful, uplifting observation about today's energy (1–2 sentences)
2. The PAST card — what strength or wisdom from the past is supporting them now
3. The PRESENT card — what positive opportunity or gift is available right now
4. The FUTURE card — what bright possibility is unfolding ahead
5. Close with a single poetic, empowering sentence as a blessing for their day

IMPORTANT RULES:
— Always interpret every card in its most positive, hopeful light, even traditionally challenging cards like The Tower or Death (frame them as liberation and transformation)
— Never mention fear, loss, danger, or negative outcomes
— Use poetic, mystical language that feels warm and encouraging
— Write as if speaking directly to the seeker with love and confidence in their journey`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    readingText = data.content?.[0]?.text || "";
    if (!readingText) throw new Error("No response received");
    body.innerHTML = `<div class="reading-body">${readingText}</div>`;
  } catch(e) {
    body.innerHTML = `<div class="error-msg">✦ The Oracle is meditating... Please try again in a moment. ✦<br><small style="opacity:0.5">${e.message}</small></div>`;
  }
}
</script>
</body>
</html>
